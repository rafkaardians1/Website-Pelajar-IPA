<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kuis Sederhana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>Kuis Pemrograman</h1>
        <form id="quizForm">
            <div class="question">
                <p>1. Apa kepanjangan dari HTML?</p>
                <input type="radio" name="q1" value="a"> Hyper Text Markup Language<br>
                <input type="radio" name="q1" value="b"> High Tech Modern Language<br>
            </div>
            
            <div class="question">
                <p>2. Tag untuk membuat paragraf adalah?</p>
                <input type="radio" name="q2" value="a"> &lt;div&gt;<br>
                <input type="radio" name="q2" value="b"> &lt;p&gt;<br>
            </div>
            
            <button type="button" onclick="hitungSkor()">Submit</button>
        </form>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
.quiz-container { background: white; padding: 20px; max-width: 600px; margin: auto; border-radius: 8px; }
.question { margin-bottom: 15px; }
h1 { text-align: center; }
button { margin-top: 20px; padding: 10px; width: 100%; cursor: pointer; }
</style>
<script>
    function hitungSkor() {
    let score = 0;
    let totalQuestions = 2;
    
    // Jawaban benar
    let a1 = "a"; // HTML
    let a2 = "b"; // <p>
    
    let form = document.forms["quizForm"];
    
    if (form["q1"].value === a1) score++;
    if (form["q2"].value === a2) score++;
    
    document.getElementById("result").innerHTML = "<h3>Skor Anda: " + score + " / " + totalQuestions + "</h3>";
}

</script>
